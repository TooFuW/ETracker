<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./popup.css">
        <title>EmailTracker</title>
    </head>
    <body>
        <div id="header">
            <div id="headerFirstPart">
                <h1>EmailTracker</h1>
                <button id="reloadPixels">
                    <p>Reload the pixels</p>
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                        <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                        <g id="SVGRepo_iconCarrier"> 
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M13.7071 1.29289C14.0976 1.68342 14.0976 2.31658 13.7071 2.70711L12.4053 4.00896C17.1877 4.22089 21 8.16524 21 13C21 17.9706 16.9706 22 12 22C7.02944 22 3 17.9706 3 13C3 12.4477 3.44772 12 4 12C4.55228 12 5 12.4477 5 13C5 16.866 8.13401 20 12 20C15.866 20 19 16.866 19 13C19 9.2774 16.0942 6.23349 12.427 6.01281L13.7071 7.29289C14.0976 7.68342 14.0976 8.31658 13.7071 8.70711C13.3166 9.09763 12.6834 9.09763 12.2929 8.70711L9.29289 5.70711C9.10536 5.51957 9 5.26522 9 5C9 4.73478 9.10536 4.48043 9.29289 4.29289L12.2929 1.29289C12.6834 0.902369 13.3166 0.902369 13.7071 1.29289Z" fill="#0F1729"></path> 
                        </g>
                    </svg>
                </button>
                <button id="createPixel">
                    <p>Create a new pixel</p>
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                        <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                        <g id="SVGRepo_iconCarrier"> 
                            <path d="M6 12H18M12 6V18" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> 
                        </g>
                    </svg>
                </button>
            </div>

            <div id="createPixelContainer">
                <div id="pixelCreation">
                    <h2>Create a new pixel</h2>
                    <input type="text" id="pixelLabel" maxlength="200" placeholder="Pixel Label - Label that will help you identify the email">
                    <button id="confirmCreatePixel">Create</button>
                </div>
                <div id="pixelCreated">
                    <h2>Copy &amp; paste in your email</h2>
                    <input type="text" id="pixelUrl" readonly>
                    <button id="copyPixelUrl">Copy</button>
                </div>
            </div>
        </div>

        <div id="content">
          <ul id="pixelsList"></ul>
          <div id="detailsBlock"></div>
        </div>

        <template id="pixelTemplate">
            <li class="pixelRow">
                <span class="pixelLabel"></span>
                <span class="pixelReadCount"></span>
            </li>
        </template>

        <div id="deleteModal">
            <div id="modalContent">
                <p>Are you sure you want to delete this pixel ?</p>
                <button id="cancelDelete">Cancel</button>
                <button id="confirmDelete">Delete</button>
            </div>
        </div>

        <script src="../config.js"></script>
        <script src="popup.js"></script>
    </body>
</html>
